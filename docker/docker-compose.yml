version: '3.9'

services:
  mongodb:
    image: mongo:7
    container_name: itsm-mongodb
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: itsm-agent
    networks:
      - itsm-network
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'db.adminCommand("ping")']
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: itsm-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - itsm-network
    healthcheck:
      test: ['CMD', 'echo', 'ruok', '|', 'nc', 'localhost', '2181']
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: itsm-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - '9092:9092'
      - '29092:29092'
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    networks:
      - itsm-network
    healthcheck:
      test: ['CMD', 'kafka-topics', '--bootstrap-server', 'localhost:29092', '--list']
      interval: 15s
      timeout: 10s
      retries: 5

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: itsm-kafka-ui
    restart: unless-stopped
    depends_on:
      - kafka
    ports:
      - '8080:8080'
    environment:
      KAFKA_CLUSTERS_0_NAME: itsm-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks:
      - itsm-network

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: itsm-backend
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - '3001:3001'
    env_file:
      - ../backend/.env
    environment:
      MONGODB_URI: mongodb://mongodb:27017/itsm-agent
      KAFKA_BROKERS: kafka:29092
      PORT: 3001
    networks:
      - itsm-network

  ai-service:
    build:
      context: ../ai-service
      dockerfile: Dockerfile
    container_name: itsm-ai-service
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - '3002:3002'
    env_file:
      - ../ai-service/.env
    environment:
      MONGODB_URI: mongodb://mongodb:27017/itsm-agent
      KAFKA_BROKERS: kafka:29092
      BACKEND_API_URL: http://backend:3001/api
      PORT: 3002
    networks:
      - itsm-network

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: itsm-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001/api
    networks:
      - itsm-network

volumes:
  mongodb_data:

networks:
  itsm-network:
    driver: bridge
